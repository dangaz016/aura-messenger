# Render.com deployment config — repo root
# prebuild in server/package.json handles building the client automatically
services:
  - type: web
    name: aura-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false
