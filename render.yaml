# Render.com deployment config — repo root
# Server serves BOTH the API and the built React frontend (same URL, same origin)
services:
  - type: web
    name: aura-server
    runtime: node
    # Build client first, then server. Server looks for ../../client/dist at runtime.
    buildCommand: npm --prefix client install && npm --prefix client run build && npm --prefix server install && npm --prefix server run build
    startCommand: npm --prefix server start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false   # Set in Render dashboard: your Groq API key
