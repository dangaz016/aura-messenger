# Render.com deployment config
services:
  - type: web
    name: aura-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: "10000"
      - key: DATA_DIR
        value: "/var/lib/render/project/data"

  - type: web
    name: aura-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: VITE_API_URL
        sync: false
