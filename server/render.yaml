# Render.com deployment config
# Place at the root of your repo (or move to repo root if you push to GitHub).

services:
  - type: web
    name: aura-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    disk:
      name: aura-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false   # set this manually in Render dashboard to your Netlify URL
      - key: PORT
        value: "3000"
      - key: DATA_DIR
        value: "/data"
